name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyQt5 pyinstaller

      - name: Build desktop executable
        run: |
          pyinstaller --noconfirm --windowed --onefile --name TaskHorizon todo.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskHorizon-windows
          path: dist/TaskHorizon.exe

      - name: Upload EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TaskHorizon.exe

